<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Babylon.js USD Playground</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; }
    #renderCanvas {
      width: 100%; height: 100%;
      display: block; outline: none;
      touch-action: none;
    }
    #dropOverlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0, 120, 255, 0.15);
      border: 3px dashed rgba(0, 120, 255, 0.6);
      z-index: 100;
      pointer-events: none;
      align-items: center; justify-content: center;
    }
    #dropOverlay.active { display: flex; }
    #dropOverlay span {
      font-family: system-ui, sans-serif;
      font-size: 1.5rem; color: #fff;
      background: rgba(0, 0, 0, 0.5);
      padding: 1rem 2rem; border-radius: 12px;
    }
    #status {
      position: fixed; bottom: 16px; left: 16px;
      font-family: system-ui, sans-serif;
      font-size: 0.85rem; color: rgba(255,255,255,0.6);
      z-index: 50;
    }
  </style>
  <script type="module" crossorigin src="/usdTest/assets/index-DlMAL1Ar.js"></script>
</head>
<body>
  <canvas id="renderCanvas"></canvas>
  <div id="dropOverlay"><span>Drop .usd / .usda / .usdz file here</span></div>
  <div id="status">Loading USD runtime…</div>
</body>
</html>
